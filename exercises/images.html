<!DOCTYPE html>
<html>
<head>
  <title>Image Styling Portfolio</title>
  <link rel="stylesheet" href="../styles/components.css">
</head>

<body>

<h1>Image Styling Portfolio</h1>

<div class="gallery">

  <div class="overlay-container">
    <img src="../images/gallery/image1.jpg" class="rounded hover-effect shadow">
    <div class="overlay-text">Image 1 Overlay</div>
  </div>

  <div class="overlay-container">
    <img src="../images/gallery/image2.jpg" class="circle hover-effect shadow">
    <div class="overlay-text">Image 2 Overlay</div>
  </div>

  <div class="overlay-container">
    <img src="../images/gallery/image3.jpg" class="rounded hover-effect shadow">
    <div class="overlay-text">Image 3 Overlay</div>
  </div>

  <div class="overlay-container">
    <img src="../images/gallery/image4.jpg" class="circle hover-effect shadow">
    <div class="overlay-text">Image 4 Overlay</div>
  </div>

  <div class="overlay-container">
    <img src="../images/gallery/image5.jpg" class="rounded hover-effect shadow">
    <div class="overlay-text">Image 5 Overlay</div>
  </div>

</div>

<h2>Button Styling Collection</h2>

<div class="button-collection">
  <button class="btn primary">Primary</button>
  <button class="btn secondary">Secondary</button>
  <button class="btn success">Success</button>
  <button class="btn danger">Danger</button>
  <button class="btn rounded shadow">Rounded Shadow</button>
  <button class="btn gradient">Gradient</button>
  <button class="btn primary" disabled>Disabled</button>
</div>

</body>
</html>
